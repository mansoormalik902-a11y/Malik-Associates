<!DOCTYPE html>
<html lang="en">

<head>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Services | Malik Associates</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f5f7fa;
color:#333;
line-height:1.7;
}

header{
background:#003366;
color:white;
text-align:center;
padding:40px 20px;
}

header img{
width:120px;
margin-bottom:15px;
}

header h1{
font-size:42px;
}

header h3{
color:#d4af37;
margin-top:10px;
}

nav{
background:#002244;
padding:15px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-weight:bold;
}

.hero{
background:white;
padding:60px 20px;
text-align:center;
}

.hero h2{
font-size:42px;
color:#003366;
margin-bottom:15px;
}

.container{
max-width:1600px;
margin:auto;
padding:50px 20px;
}

.service-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}

.service-card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
border-top:5px solid #d4af37;
}

.service-card h3{
color:#003366;
text-align:center;
margin-bottom:20px;
font-size:20px;
}

.service-links{
display:flex;
flex-direction:column;
gap:10px;
}

.service-btn{
background:#f5f7fa;
padding:12px;
border-radius:8px;
text-decoration:none;
color:#003366;
font-weight:bold;
transition:.3s;
}

.service-btn:hover{
background:#003366;
color:white;
padding-left:18px;
}

footer{
background:#003366;
color:white;
text-align:center;
padding:30px;
margin-top:50px;
}

@media(max-width:1200px){
.service-grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:768px){

.service-grid{
grid-template-columns:1fr;
}

nav a{
display:block;
margin:10px;
}

header h1{
font-size:30px;
}

.hero h2{
font-size:28px;
}

}

</style>

</head>

<body>

</body>

</html>
